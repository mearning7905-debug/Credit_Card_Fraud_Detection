<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SmartPay | Card Details</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="left">
            <span class="menu-btn" onclick="openMenu()">☰</span>
            <span class="logo">💳 SmartPay</span>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="closeMenu()">❌</span>
        <button onclick="toggleTheme()">🌓 Toggle Theme</button>
        <button onclick="location.href='/'">📺 Product</button>
        <button onclick="location.href='/history'">📜 History</button>
        <button onclick="location.href='/help'">❓ Get Help</button>
        <button onclick="location.href='/feedback'">📝 Feedback</button>
    </div>

    <div id="overlay" onclick="closeMenu()" style="display:none;"></div>

    <!-- CARD FORM -->
    <div class="card-box">
        <h2>Card Details</h2>
        <p class="sub">Enter your payment information</p>

        <form method="post" action="/card">

            <label>Card Number</label>
            <input type="tel" name="card_number" placeholder="XXXX XXXX XXXX XXXX" maxlength="19"
                oninput="detectCardType(this.value)" required>
            <p id="cardType"></p>
            <label>Bank Name</label>
            <select name="bank_name" required>
                <option value="">Select Bank</option>
                <option>HDFC Bank</option>
                <option>ICICI Bank</option>
                <option>State Bank of India</option>
                <option>Axis Bank</option>
            </select>

            <label>Payment Method</label>
            <input type="text" name="payment_method" value="Credit Card" readonly>

            <label>Expiry (MM/YY)</label>
            <input type="tel" name="expiry" placeholder="MM/YY" maxlength="5" required>

            <label>Amount</label>
            <input type="text" name="amount" value="{{amount}}" readonly>

            <label>CVV</label>
            <input type="tel" name="cvv" maxlength="3" placeholder="***" required>

            <button type="submit">Verify & Get OTP</button>
        </form>
    </div>

    <script>
        // THEME
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light-theme");
        }

        function toggleTheme() {
            document.body.classList.toggle("light-theme");
            localStorage.setItem(
                "theme",
                document.body.classList.contains("light-theme") ? "light" : "dark"
            );
        }

        function openMenu() {
            document.getElementById("sidebar").classList.add("active");
            document.getElementById("overlay").style.display = "block";
        }

        function closeMenu() {
            document.getElementById("sidebar").classList.remove("active");
            document.getElementById("overlay").style.display = "none";
        }

        function detectCardType(number) {
            number = number.replace(/\D/g, "");
            const el = document.getElementById("cardType");

            if (/^4/.test(number)) el.innerText = "🟦 Visa Card";
            else if (/^5[1-5]/.test(number)) el.innerText = "🟥 MasterCard";
            else if (/^3[47]/.test(number)) el.innerText = "🟩 American Express";
            else if (/^(60|65)/.test(number)) el.innerText = "🟨 RuPay Card";
            else el.innerText = "";
        }
    </script>

    <!-- CHATBOT -->
    <div id="chatbot-btn" onclick="toggleChat()">🤖</div>

    <div id="chatbot-box">
        <div id="chat-header">
            <span>SmartPay Assistant</span>
            <div class="window-controls">
                <span onclick="newChat()" title="New Chat">＋</span>
                <span onclick="clearChat()" title="Clear Chat">🧹</span>
            </div>
        </div>

        <div id="chat-body"></div>

        <div id="chat-footer">
            <input type="text" id="chat-input" placeholder="Ask about OTP, fraud, payment">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="static/script.js"></script>

</body>

</html>
