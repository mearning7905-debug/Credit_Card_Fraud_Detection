<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ElectroShop | Explore Products</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background-color: #0b0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #0b1218;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00d2ff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Search Section */
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 70%;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #161b22;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            width: 70%;
            padding: 12px;
            margin-top: 10px;
            background: #3b71f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Category Filters */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-chip {
            background: #1e252b;
            color: #888;
            border: 1px solid #333;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-chip.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .sort-select {
            width: 100%;
            background: #161b22;
            color: white;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #3b71f3;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .card h3 {
            font-size: 16px;
            margin: 10px 0;
            color: #fff;
        }

        .price {
            color: #00d2ff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pay-btn {
            background: #3b71f3;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .detail-btn {
            background: #21262d;
            color: white;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cart-icon {
            font-size: 24px;
            cursor: pointer;
        }
    </style>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        async function startPayment(amount) {

            let response = await fetch("/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount: amount })
            })

            let order = await response.json()

            var options = {
                key: "rzp_test_SPoIpuOUhqlt8e",
                amount: order.amount,
                currency: "INR",
                name: "SmartPay Store",
                description: "Product Purchase",
                order_id: order.id,

                handler: async function (response) {

                    await fetch("/verify-payment", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(response)
                    })

                    alert("✅ Payment Successful")

                    location.href = "/history"
                }
            }

            var rzp = new Razorpay(options)
            rzp.open()

        }
    </script>
</head>

<body>

    <div class="navbar">
        <div class="logo">⚡ ElectroShop</div>
        <div class="cart-icon">🛒</div>
    </div>

    <div class="container">
        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Search product (tv, laptop, phone...)">
            <button class="search-btn" onclick="searchProduct()">Search</button>
        </div>

        <div class="filter-section">
            <div class="category-chip active" onclick="filterCat('all', this)">All</div>
            <div class="category-chip" onclick="filterCat('AC', this)">AC</div>
            <div class="category-chip" onclick="filterCat('Phone', this)">Phones</div>
            <div class="category-chip" onclick="filterCat('TV', this)">TV</div>
            <div class="category-chip" onclick="filterCat('Fridge', this)">Fridges</div>
        </div>

        <select class="sort-select" onchange="sortPrice(this.value)">
            <option value="">Sort By Price</option>
            <option value="low">Low to High</option>
            <option value="high">High to Low</option>
        </select>

        <div class="grid" id="imageGrid">
            {% for p in products %}
            <div class="card" data-price="{{ p.price }}" data-name="{{ p.name }}">
                <img src="/static/{{ p.image }}">
                <h3>{{ p.name }}</h3>
                <div class="price">₹{{ p.price }}</div>
                <div class="btn-group">
                    <button class="pay-btn" onclick="startPayment({{ p.price }})">Pay Now</button>
                    <button class="detail-btn" onclick="location.href='/product/{{ p.id }}'">View Details</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function filterCat(cat, el) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                let name = c.getAttribute('data-name').toLowerCase();
                c.style.display = (cat === 'all' || name.includes(cat.toLowerCase())) ? 'block' : 'none';
            });
        }

        function sortPrice(order) {
            let grid = document.getElementById('imageGrid');
            let cards = Array.from(grid.querySelectorAll('.card'));
            cards.sort((a, b) => {
                let pA = parseInt(a.getAttribute('data-price'));
                let pB = parseInt(b.getAttribute('data-price'));
                return order === 'low' ? pA - pB : pB - pA;
            });
            grid.innerHTML = "";
            cards.forEach(c => grid.appendChild(c));
        }

        function searchProduct() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                let name = c.getAttribute('data-name').toLowerCase();
                c.style.display = name.includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>

</html>
