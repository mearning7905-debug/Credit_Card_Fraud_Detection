<!DOCTYPE html>
<html>

<head>
    <title>OTP Verification</title>
    <link rel="stylesheet" href="static/style.css">

    <style>
        /* Blur Background */
        .blur-bg {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
        }

        /* OTP Modal */
        .otp-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .otp-modal-content {
            background: #1e2a3a;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

    <div id="mainContent">

        <!-- NAVBAR -->
        <div class="navbar">
            <div class="left">
                <span class="menu-btn" onclick="openMenu()"> ☰</span>
                <span class="logo">💳 SmartPay</span>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar">
            <span class="close-btn" onclick="closeMenu()">❌</span>
            <button onclick="toggleTheme()">🌓 Toggle Theme</button>
            <button onClick="location.href='/'">💳 Payment</button>
            <button onClick="location.href='/history'">📜 History</button>
            <button onClick="location.href='/help'">❓ Get Help</button>
            <button onClick="location.href='/feedback'">📝 Feedback</button>
        </div>

        <!-- OVERLAY -->
        <div id="overlay" onclick="closeMenu()"></div>

        <div class="card-box">
            <h2>OTP Verification</h2>

            {% if error %}
            <p style="color:red">{{ error }}</p>
            {% endif %}

            <button onclick="showOTP()" style="margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;">
                Show OTP
            </button>

            <br><br>

            <form method="post" action="/verify">
                <input type="text" name="otp" placeholder="Enter OTP" required>
                <br><br>
                <button type="submit">Verify OTP</button>
            </form>

            <br>

            <form action="/resend_otp" method="get">
                <button type="submit">Resend OTP</button>
            </form>
        </div>

    </div>

    <!-- OTP POPUP -->
    <div id="otpModal" class="otp-modal">
        <div class="otp-modal-content">
            <h3>🔐 OTP Verification</h3>

            <p style="color:#38bdf8; font-weight:bold;">
                OTP: {{ otp }}
            </p>

            <p id="popupTimer" style="color:#facc15;">
                OTP expires in <span id="popupTime">30</span> seconds
            </p>

            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <input type="hidden" id="resentFlag" value="{{ 'true' if resent else 'false' }}">

    <script>
        let popupTime = 30;
        let popupTimer;

        function showOTP() {

            document.getElementById("otpModal").style.display = "flex";
            document.getElementById("mainContent").classList.add("blur-bg");

            popupTime = 30;
            clearInterval(popupTimer);

            popupTimer = setInterval(() => {
                popupTime--;
                document.getElementById("popupTime").innerText = popupTime;

                if (popupTime <= 0) {
                    clearInterval(popupTimer);
                    document.getElementById("popupTimer").innerHTML = "❌ OTP Expired";
                }
            }, 1000);
        }

        function closePopup() {
            document.getElementById("otpModal").style.display = "none";
            document.getElementById("mainContent").classList.remove("blur-bg");
            clearInterval(popupTimer);
        }

        if (document.getElementById("resentFlag").value === "true") {
            showOTP();
        }
    </script>

    <script src="static/script.js"></script>

</body>

</html>

<!-- 🤖 CHATBOT BUTTON -->
<div id="chatbot-btn" onclick="toggleChat()">🤖</div>

<!-- 🤖 CHATBOT BOX -->
<div id="chatbot-box">
    <div id="chat-header">
        <span>SmartPay Assistant</span>

        <div class="window-controls">
            <!-- NEW CHAT -->
            <span onclick="newChat()" title="New Chat">＋</span>

            <!-- CLEAR CHAT -->
            <span onclick="clearChat()" title="Clear Chat">🧹</span>

        </div>
    </div>



    <div id="chat-body"></div>

    <div id="chat-footer">
        <input type="text" id="chat-input" placeholder="Ask about OTP, fraud, payment">
        <button id="send-btn">Send</button>
    </div>
</div>

<script src="static/script.js"></script>



</body>

</html>
